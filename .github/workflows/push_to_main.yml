name: Build and publish on docker registry
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      tag:
        type: string
        description: 'Git tag to build from (leave empty for main branch)'
        required: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: ./.github/actions/docker/publish
        name: Publish edc-extension4aas
        with:
          registry_name: 'docker.io'
          organisation_name: ${{ github.repository_owner }}
          project_name: 'edc-extension4aas'
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_token: ${{ secrets.DOCKER_TOKEN }}
