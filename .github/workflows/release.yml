name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (x.y.z)'
        required: true
        type: string
      next_version:
        description: 'Next development SNAPSHOT version (x.y.z-SNAPSHOT) - input must include -SNAPSHOT'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify version snapshot
        shell: bash
        run: |
          SNAPSHOT="${{ inputs.version }}-SNAPSHOT"
          CURRENT=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ "$CURRENT" != "$SNAPSHOT" ]; then
            echo "Expected version=$SNAPSHOT in gradle.properties but found version=$CURRENT" >&2
            exit 1
          fi
          echo "Version matches: $CURRENT"

      - name: Set up git user
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release commit and tag
        shell: bash
        run: |
          BRANCH="release/v${{ inputs.version }}"
          git checkout -b "$BRANCH"

          sed -i "s/^version=.*-SNAPSHOT/version=${{ inputs.version }}/" gradle.properties
          sed -i "s/^## Current development version (V${{ inputs.version }}-SNAPSHOT)/## V${{ inputs.version }}/" changelog.md
          git add gradle.properties changelog.md
          git commit -m "chore: prepare release v${{ inputs.version }}"

          git tag v${{ inputs.version }}

      - name: Bump to next development version
        shell: bash
        run: |
          sed -i "s/^version=.*/version=${{ inputs.next_version }}/" gradle.properties
          NEXT="## Current development version (V${{ inputs.next_version }})"
          RELEASE="## V${{ inputs.version }}"
          SECTIONS="### New Features\n\n### Bugfixes\n\n### Miscellaneous"
          sed -i "s/^${RELEASE}/${NEXT}\n\n${SECTIONS}\n\n${RELEASE}/" changelog.md
          git add gradle.properties changelog.md
          git commit -m "chore: bump to ${{ inputs.next_version }}"

      - name: Push release branch and tag
        shell: bash
        run: |
          BRANCH="release/v${{ inputs.version }}"
          git push origin "$BRANCH"
          git push origin v${{ inputs.version }}

      - name: Create Pull Request
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "release/v${{ inputs.version }}" \
            --title "Release V${{ inputs.version }}" \
            --body "This PR prepares the V${{ inputs.version }} release.

          After merging, the Docker image will be built and published automatically."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: V${{ inputs.version }}
          body: |
            Release V${{ inputs.version }} of the EDC-Extension-for-AAS.
          token: ${{ secrets.GITHUB_TOKEN }}
