name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (x.y.z)'
        required: true
        type: string
      next_version:
        description: 'Next development SNAPSHOT version (x.y.z-SNAPSHOT) - input must include -SNAPSHOT'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify version snapshot
        shell: bash
        run: |
          SNAPSHOT="${{ inputs.version }}-SNAPSHOT"
          CURRENT=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ "$CURRENT" != "$SNAPSHOT" ]; then
            echo "Expected version=$SNAPSHOT in gradle.properties but found version=$CURRENT" >&2
            exit 1
          fi
          echo "Version matches: $CURRENT"

      - name: Update gradle.properties to release version
        shell: bash
        run: |
          sed -i "s/^version=.*-SNAPSHOT/version=${{ inputs.version }}/" gradle.properties

      - name: Update changelog heading
        shell: bash
        run: |
          sed -i "s/^## Current development version (V${{ inputs.version }}-SNAPSHOT)/## V${{ inputs.version }}/" changelog.md

      - name: Commit release preparation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties changelog.md
          git commit -m "chore: prepare release v${{ inputs.version }}"

      - name: Create tag
        shell: bash
        run: |
          git tag v${{ inputs.version }}

      - name: Build project
        shell: bash
        run: ./gradlew build

      - name: Push commit and tag
        shell: bash
        run: |
          git push
          git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: V${{ inputs.version }}
          body: |
            Release V${{ inputs.version }} of the EDC-Extension-for-AAS.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump gradle.properties to next snapshot
        shell: bash
        run: |
          sed -i "s/^version=.*/version=${{ inputs.next_version }}/" gradle.properties

      - name: Add new changelog section
        shell: bash
        run: |
          NEXT="## Current development version (V${{ inputs.next_version }})"
          RELEASE="## V${{ inputs.version }}"
          SECTIONS="### New Features\n\n### Bugfixes\n\n### Miscellaneous"
          sed -i "s/^${RELEASE}/${NEXT}\n\n${SECTIONS}\n\n${RELEASE}/" changelog.md

      - name: Commit and push next development version
        shell: bash
        run: |
          git add gradle.properties changelog.md
          git commit -m "chore: bump to ${{ inputs.next_version }}"
          git push
