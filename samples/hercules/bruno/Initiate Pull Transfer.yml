    data: |-
      {
        "@context": {
          "edc": "https://w3id.org/edc/v0.0.1/ns/"
        },
        "@type": "TransferRequestMessage",
        "protocol": "dataspace-protocol-http:2025-1",
        "contractId": "18bd2ef4-3ff3-4564-8c27-1a5b29e6a6b9",
