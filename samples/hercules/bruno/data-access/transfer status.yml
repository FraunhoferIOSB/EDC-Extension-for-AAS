info:
  name: transfer status
  type: http
  seq: 1

http:
  method: GET
  url: "{{p2-management-api}}/transferprocesses/:transfer-id"
  params:
    - name: transfer-id
      value: 40a477a0-8be2-4483-89a7-e5f39cf83897
      type: path
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body['@id']
        method: jsonq
      variable:
        name: transfer-id
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
