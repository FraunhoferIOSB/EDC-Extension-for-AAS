##################
### EDC Config ###
##################
edc.hostname=data-plane

#################
# API Endpoints #
#################

web.http.public.port=9500
web.http.public.path=/public
edc.dataplane.api.public.baseurl=http://data-plane:9500/public

# To not make the dataplane cry
web.http.management.port=9510


#####################################
# Data Plane Specific Configuration #
#####################################

# "Where is the control plane"
edc.dpf.selector.url=http://control-plane:8083/control/v1/dataplanes
edc.data.plane.self.unregistration=true
tx.edc.dataplane.token.refresh.endpoint=http://data-plane:9500/public
# Data plane provides keys to access data.
# The priv/pub key pair is generated by the toolbox
edc.transfer.proxy.token.signer.privatekey.alias=private-key
edc.transfer.proxy.token.verifier.publickey.alias=public-key

# Persistence
edc.datasource.default.url=jdbc:postgresql://postgres:5432/edc
edc.sql.schema.autocreate=true

# IDK why, but these do get read from vault but are not used. Only if defined in config will they be used to connect to the db.
edc.datasource.default.user=postgres
edc.datasource.default.password=password

# Vault
edc.vault.hashicorp.health.check.enabled=true

####################
# Identity-related #
####################

# Participant, Issuer
edc.participant.id=did:web:identity-hub%3A10100:participant1
# Randomly generated context id
edc.participant.context.id=3fbf5e72-6f5c-4962-84dc-2d360b720e8e
edc.iam.issuer.id=did:web:identity-hub%3A10100:participant1
# Add more issuers=edc.iam.trusted-issuer.<my-issuer>.id=<my-issuers-did>
edc.iam.trusted-issuer.issuer-service.id=did:web:issuer-service%3A10100
edc.iam.credential.revocation.mimetype=application/json

# STS
edc.iam.sts.oauth.token.url=http://identity-hub:8087/api/sts/token
edc.iam.sts.oauth.client.id=did:web:identity-hub%3A10100:participant1
# Note=this secret is generated by the init.sh script inside the toolbox container
edc.iam.sts.oauth.client.secret.alias=sts-client-secret

# Set to true if communication over official URLs happens
edc.iam.did.web.use.https=false
